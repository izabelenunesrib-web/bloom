name: bloom
description: Bloom - Seu organizador pessoal
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  go_router: ^14.6.2

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6

  google_sign_in: ^6.2.2

  flutter_local_notifications: ^18.0.1

  intl: ^0.19.0

  table_calendar: ^3.1.2

  fl_chart: ^0.69.2

  google_fonts: ^6.2.1

  flutter_animate: ^4.5.2

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  uuid: ^4.5.1

  image_picker: ^1.1.2

  shared_preferences: ^2.3.3

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

